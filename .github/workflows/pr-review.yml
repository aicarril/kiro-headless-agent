name: Agent PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  code-review:
    name: Code Review Agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build agent image
        run: docker build --platform linux/amd64 -t kiro-agent:latest .

      - name: Run PR reviewer
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          docker run --rm --platform linux/amd64 \
            -e KIRO_API_KEY="$KIRO_API_KEY" \
            -e GITHUB_TOKEN="$GH_PAT" \
            -e GH_TOKEN="$GH_PAT" \
            kiro-agent:latest \
            chat --no-interactive --trust-all-tools --agent pr-reviewer-agent \
            "Review PR #${{ github.event.pull_request.number }} on repo ${{ github.repository }}. Check the diff for bugs, security issues, style violations. Post your review as a PR comment."

  query-review:
    name: Query Review Agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build agent image
        run: docker build --platform linux/amd64 -t kiro-agent:latest .

      - name: Run query reviewer
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          docker run --rm --platform linux/amd64 \
            -e KIRO_API_KEY="$KIRO_API_KEY" \
            -e GITHUB_TOKEN="$GH_PAT" \
            -e GH_TOKEN="$GH_PAT" \
            -e AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
            -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
            -e AWS_REGION="$AWS_REGION" \
            kiro-agent:latest \
            chat --no-interactive --trust-all-tools --agent query-review-agent \
            "Review PR #${{ github.event.pull_request.number }} on repo ${{ github.repository }}. Find any SQL in the diff, run against live Athena, optimize with output equivalence validation, and post findings as a PR comment."
